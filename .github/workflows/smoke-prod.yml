name: Smoke Check Production

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for CDN propagation
        run: sleep 20

      - name: Run production smoke check
        id: smoke
        env:
          SMOKE_URL: https://undangan.salkot.online/__force-fail-smoke__
          SMOKE_ASSET_PREFIX: /__should_fail__/
        run: node scripts/smoke-prod.mjs

      - name: Notify admin on smoke failure
        if: failure()
        continue-on-error: true
        env:
          WHATSAPP_ADMIN_PHONE: "081999386550"
          WHATSAPP_CALLMEBOT_APIKEY: ${{ secrets.WHATSAPP_CALLMEBOT_APIKEY }}
          ALERT_TITLE: "Smoke check production gagal"
          ALERT_BODY: "Pemeriksaan pasca deploy mendeteksi kegagalan pada production site."
          ALERT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify-whatsapp.mjs

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate quality gate
        run: |
          npm run lint
          npm run test:run

      - name: Build
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-after-deploy:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for CDN propagation
        run: sleep 30

      - name: Run production smoke check
        env:
          SMOKE_URL: https://undangan.salkot.online/
        run: node scripts/smoke-prod.mjs

      - name: Notify admin on smoke failure
        if: failure()
        continue-on-error: true
        env:
          WHATSAPP_ADMIN_PHONE: "081999386550"
          WHATSAPP_CALLMEBOT_APIKEY: ${{ secrets.WHATSAPP_CALLMEBOT_APIKEY }}
          ALERT_TITLE: "Smoke check pasca deploy gagal"
          ALERT_BODY: "Deploy ke production selesai, tetapi smoke check pasca deploy gagal."
          ALERT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify-whatsapp.mjs
